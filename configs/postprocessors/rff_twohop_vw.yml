postprocessor:
  name: rff
  APS_mode: True
  postprocessor_args:
    sigma: 0.5
    D: 1024
    alpha: 0.05
    feature_space: penultimate
    normalize: True
    diagnose: True
    debug: True
    score_mode: twohop
    variance_weighted: True
    search_mode: fast
  postprocessor_sweep:
    sigma: [0.1, 0.5, 1.0, 2.0]
    D: [512, 1024, 2048]
    alpha: [0.025, 0.05, 0.10]
  postprocessor_sweep_full:
    sigma: [0.05, 0.1, 0.2, 0.3, 0.5, 0.75, 1.0, 1.5, 2.0]
    D: [512, 1024, 2048, 4096]
    alpha: [0.025, 0.05, 0.10]
    normalize: [True, False]
