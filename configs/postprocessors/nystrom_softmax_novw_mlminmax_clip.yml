postprocessor:
  name: nystrom_softmax_novw_mlminmax_clip
  APS_mode: False
  postprocessor_args:
    sigma: 0.5
    n_anchors: 200
    anchor_init: kmeans
    reg_lambda: 1.0e-4
    kmeans_iter: 50
    alpha: 0.05
    normalize: True
    score_mode: softmax
    variance_weighted: False
    pca_layers: [1, 2, 3, 4]
    pool_mode: minmax
    yosinski_weights: [0.712, 0.734, 0.771, 0.790]
    clip_backbone: ViT-B/16
    data_root: ./data
  postprocessor_sweep: {}
