postprocessor:
  name: rff_softmax_vw_mlpca_idtopk
  APS_mode: True
  postprocessor_args:
    sigma: 0.5
    D: 1024
    alpha: 0.05
    feature_space: multilayer_pca
    pca_layers: [2, 3, 4]
    pca_components: 128
    layer_selection: id_fisher_topk
    layer_selection_k: 2
    layer_selection_source: train
    normalize: True
    diagnose: True
    debug: True
    score_mode: softmax
    variance_weighted: True
    search_mode: fast
  postprocessor_sweep:
    sigma: [0.1, 0.5, 1.0, 2.0]
    D: [512, 1024, 2048]
    alpha: [0.025, 0.05, 0.10]
  hyperparam_search_done: False
