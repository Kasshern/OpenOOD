postprocessor:
  name: rff_dual_gated_vw
  APS_mode: False
  postprocessor_args:
    sigma: auto
    D: 1024
    alpha: 0.05
    feature_space: penultimate
    normalize: True
    normalize_phi: True
    variance_weighted: True
    score_mode: dual_gated
    dual_head: True
    head_alpha: 0.5
    gate_margin: 0.10
    near_preserve: True
  postprocessor_sweep:
    sigma: [0.1, 0.25, 0.5, 1.0, 2.0]
    D: [512, 1024, 2048]
