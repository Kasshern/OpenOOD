postprocessor:
  name: nystrom_predictor_aware_novw_idtopk
  APS_mode: False
  postprocessor_args:
    sigma: 0.5
    n_anchors: 200
    anchor_init: kmeans
    reg_lambda: 1.0e-4
    kmeans_iter: 50
    alpha: 0.05
    normalize: True
    score_mode: predictor_aware
    variance_weighted: False
    feature_space: multilayer_pca
    pca_layers: [0, 1, 2, 3, 4]
    pca_components: 128
    layer_selection: id_fisher_topk
    layer_selection_k: 2
    layer_selection_source: train
  postprocessor_sweep: {}
  hyperparam_search_done: False
